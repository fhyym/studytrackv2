<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Ledger — Monthly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EF;
    --paper-raised:#FFFFFF;
    --ink:#1E2A38;
    --ink-soft:#5B6672;
    --ink-faint:#A8AEB6;
    --rule:#DDD8CC;
    --sage:#4C8064;
    --sage-soft:#E7EFE8;
    --rust:#B5502E;
    --rust-soft:#F5E7E0;
    --amber:#B08324;
    --amber-soft:#F3ECDA;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:56px 24px 96px;
  }

  /* ---------- No-user prompt ---------- */
  .gate{
    max-width:520px;
    margin:120px auto;
    text-align:center;
    padding:0 24px;
  }
  .gate h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    margin-bottom:12px;
  }
  .gate p{
    color:var(--ink-soft);
    font-size:15px;
    line-height:1.6;
    margin-bottom:6px;
  }
  .gate code{
    font-family:'JetBrains Mono', monospace;
    background:var(--paper-raised);
    border:1px solid var(--rule);
    padding:2px 6px;
    border-radius:3px;
    font-size:13px;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--rule);
    padding-bottom:28px;
    margin-bottom:40px;
    opacity:0;
    animation:rise .6s ease forwards;
  }

  .nickname{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(40px, 6vw, 64px);
    line-height:1;
    letter-spacing:-0.01em;
  }

  .subline{
    margin-top:8px;
    font-size:14px;
    color:var(--ink-soft);
    letter-spacing:.04em;
  }

  .month-tag{
    text-align:right;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--ink-soft);
  }

  .month-nav{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-top:2px;
  }

  .nav-btn{
    appearance:none;
    border:1px solid var(--rule);
    background:var(--paper-raised);
    color:var(--ink);
    width:26px;
    height:26px;
    border-radius:3px;
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .nav-btn:hover{background:var(--sage-soft); border-color:var(--sage); color:var(--sage);}
  .nav-btn:active{transform:scale(.94);}
  .nav-btn.shake{animation:shake .32s ease;}
  .nav-btn:disabled{opacity:.35; cursor:default;}
  .nav-btn:disabled:hover{background:var(--paper-raised); border-color:var(--rule); color:var(--ink);}

  .month-name{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:22px;
    color:var(--ink);
    min-width:150px;
    text-align:center;
  }

  .month-note{
    margin-top:6px;
    font-size:11px;
    color:var(--rust);
    height:14px;
    opacity:0;
    transition:opacity .25s ease;
  }
  .month-note.show{opacity:1;}

  /* ---------- Stat row ---------- */
  .stats{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:1px;
    background:var(--rule);
    border:1px solid var(--rule);
    margin-bottom:48px;
    opacity:0;
    animation:rise .6s ease .1s forwards;
  }

  .stat{
    background:var(--paper-raised);
    padding:20px 16px;
  }

  .stat-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    margin-bottom:10px;
  }

  .stat-value{
    font-family:'JetBrains Mono', monospace;
    font-size:22px;
    font-weight:600;
    line-height:1;
  }

  .stat-value.positive{color:var(--sage);}
  .stat-value.negative{color:var(--rust);}

  @media (max-width:720px){
    .stats{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:460px){
    .stats{grid-template-columns:repeat(2,1fr);}
  }

  /* ---------- Table ---------- */
  .table-title{
    font-family:'Fraunces', serif;
    font-size:20px;
    font-weight:600;
    margin-bottom:16px;
    opacity:0;
    animation:rise .6s ease .18s forwards;
  }

  .table-scroll{
    overflow-x:auto;
    border:1px solid var(--rule);
    background:var(--paper-raised);
    opacity:0;
    animation:rise .6s ease .24s forwards;
    position:relative;
  }

  table{
    width:100%;
    border-collapse:collapse;
    min-width:680px;
  }

  thead th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.07em;
    color:var(--ink-soft);
    font-weight:500;
    padding:14px 16px;
    border-bottom:1px solid var(--rule);
    background:var(--paper);
  }

  tbody td{
    padding:12px 16px;
    font-size:14px;
    border-bottom:1px solid var(--rule);
    vertical-align:middle;
  }

  tbody tr:last-child td{border-bottom:none;}

  tbody tr{transition:background .15s ease;}
  tbody tr:hover{background:#FAF8F2;}

  tbody tr.empty-row{color:var(--ink-faint);}
  tbody tr.empty-row td{color:var(--ink-faint);}
  tbody tr.empty-row .day-num, tbody tr.empty-row .day-name{color:var(--ink-faint);}

  .date-cell .day-name{
    display:block;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.03em;
  }
  .date-cell .day-num{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:14px;
  }

  .num{font-family:'JetBrains Mono', monospace; font-variant-numeric:tabular-nums;}
  .num.positive{color:var(--sage);}
  .num.negative{color:var(--rust);}
  .num.zero{color:var(--ink-soft);}

  .notes-cell{color:var(--ink-soft); font-size:13px; max-width:220px;}

  .pill{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.03em;
    padding:3px 9px;
    border-radius:3px;
    text-transform:uppercase;
  }
  .pill.completed{background:var(--sage-soft); color:var(--sage);}
  .pill.failed{background:var(--rust-soft); color:var(--rust);}
  .pill.waived{background:var(--amber-soft); color:var(--amber);}
  .pill.none{background:var(--paper); color:var(--ink-faint);}

  .table-loading{
    position:absolute;
    inset:0;
    background:rgba(246,244,239,.7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
  }
  .table-loading.show{opacity:1; pointer-events:all;}

  footer{
    margin-top:32px;
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-3px);}
    75%{transform:translateX(3px);}
  }

  @media (prefers-reduced-motion: reduce){
    header, .stats, .table-title, .table-scroll{animation:none; opacity:1;}
    tbody tr, .nav-btn{transition:none;}
    .nav-btn.shake{animation:none;}
  }

  [hidden]{display:none !important;}
</style>
</head>
<body>

  <!-- Shown when ?user=... is missing -->
  <div class="gate" id="gate" hidden>
    <h1>Select a student</h1>
    <p>No user was specified for this dashboard.</p>
    <p>Add a <code>user</code> parameter to the URL, for example:</p>
    <p><code id="gateExample">?user=johnny</code></p>
  </div>

  <!-- Main report -->
  <div class="wrap" id="app" hidden>

    <header>
      <div>
        <div class="nickname" id="nickname">—</div>
        <div class="subline" id="fullname">—</div>
      </div>
      <div class="month-tag">
        Report period
        <div class="month-nav">
          <button class="nav-btn" id="prevBtn" aria-label="Previous month">&lt;</button>
          <span class="month-name" id="monthName">—</span>
          <button class="nav-btn" id="nextBtn" aria-label="Next month">&gt;</button>
        </div>
        <div class="month-note" id="monthNote">No data for that month</div>
      </div>
    </header>

    <section class="stats" id="statsRow"></section>

    <div class="table-title">Daily log</div>
    <div class="table-scroll">
      <div class="table-loading" id="tableLoading">Loading…</div>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Study hours</th>
            <th>Bonus hours</th>
            <th>Penalty</th>
            <th>Status</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <footer id="footerNote">Study Ledger — generated report</footer>
  </div>

<script>
/* ---------------------------------------------------------
   Config
--------------------------------------------------------- */
const DATA_ROOT = "data/users"; // data/users/<username>/<YYYY-MM>.json
const ROWS_PER_TABLE = 31;      // table always renders this many rows

const MONTH_NAMES = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];

/* ---------------------------------------------------------
   State
--------------------------------------------------------- */
let currentUser = null;
let currentYear = null;
let currentMonth = null; // 1-12

/* ---------------------------------------------------------
   Init — read ?user= (and optional ?month=YYYY-MM) from the URL
--------------------------------------------------------- */
function init(){
  const params = new URLSearchParams(window.location.search);
  currentUser = params.get("user");

  if(!currentUser){
    document.getElementById("gate").hidden = false;
    document.title = "Study Ledger — select a user";
    return;
  }

  document.getElementById("app").hidden = false;

  const monthParam = params.get("month"); // optional YYYY-MM
  const now = new Date();
  if(monthParam && /^\d{4}-\d{2}$/.test(monthParam)){
    currentYear = parseInt(monthParam.slice(0,4), 10);
    currentMonth = parseInt(monthParam.slice(5,7), 10);
  } else {
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
  }

  document.getElementById("prevBtn").addEventListener("click", () => shiftMonth(-1));
  document.getElementById("nextBtn").addEventListener("click", () => shiftMonth(1));

  loadMonth(currentYear, currentMonth);
}

/* ---------------------------------------------------------
   File path helper: data/users/<username>/<YYYY-MM>.json
--------------------------------------------------------- */
function filePath(year, month){
  const mm = String(month).padStart(2, "0");
  return `${DATA_ROOT}/${currentUser}/${year}-${mm}.json`;
}

/* ---------------------------------------------------------
   Fetch + render a given year/month.
   On failure, the current view is left untouched.
--------------------------------------------------------- */
async function loadMonth(year, month, opts = {}){
  const { fromNav = false, navBtn = null } = opts;
  const loadingEl = document.getElementById("tableLoading");
  loadingEl.classList.add("show");

  try{
    const res = await fetch(filePath(year, month));
    if(!res.ok) throw new Error("not found");
    const report = await res.json();

    currentYear = year;
    currentMonth = month;
    render(report);
    setMonthNote(""); // clear any previous "no data" note

    // reflect state in the URL without reloading
    const params = new URLSearchParams(window.location.search);
    params.set("user", currentUser);
    params.set("month", `${year}-${String(month).padStart(2,"0")}`);
    history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);

  } catch(err){
    if(fromNav){
      setMonthNote(`No data for ${MONTH_NAMES[month-1]} ${year}`);
      if(navBtn){
        navBtn.classList.remove("shake");
        void navBtn.offsetWidth; // restart animation
        navBtn.classList.add("shake");
      }
    } else {
      setMonthNote(`No data found for ${MONTH_NAMES[month-1]} ${year}`);
      document.getElementById("nickname").textContent = currentUser;
      document.getElementById("fullname").textContent = "";
      document.getElementById("monthName").textContent = `${MONTH_NAMES[month-1]} ${year}`;
      document.getElementById("statsRow").innerHTML = "";
      renderEmptyTable();
    }
  } finally {
    loadingEl.classList.remove("show");
  }
}

function setMonthNote(text){
  const note = document.getElementById("monthNote");
  note.textContent = text;
  note.classList.toggle("show", !!text);
}

/* ---------------------------------------------------------
   Month navigation — only actually switches if the target
   month's file exists (loadMonth silently no-ops otherwise).
--------------------------------------------------------- */
function shiftMonth(delta){
  let year = currentYear;
  let month = currentMonth + delta;
  if(month < 1){ month = 12; year -= 1; }
  if(month > 12){ month = 1; year += 1; }

  const btn = document.getElementById(delta < 0 ? "prevBtn" : "nextBtn");
  loadMonth(year, month, { fromNav:true, navBtn: btn });
}

/* ---------------------------------------------------------
   Formatting helpers
--------------------------------------------------------- */
function fmtHours(n){
  return (Math.round(n*100)/100).toString();
}
function signed(n, unit){
  if(n > 0) return {text:`+${fmtHours(n)}${unit}`, cls:"positive"};
  if(n < 0) return {text:`${fmtHours(n)}${unit}`, cls:"negative"};
  return {text:`0${unit}`, cls:"zero"};
}

/* ---------------------------------------------------------
   Render a loaded report
--------------------------------------------------------- */
function render(report){
  document.getElementById("nickname").textContent = report.student.nickname;
  document.getElementById("fullname").textContent = report.student.full_name;
  document.getElementById("monthName").textContent =
    `${report.report_period.month_name} ${report.report_period.year}`;

  const m = report.monthly_statistics;
  const stats = [
    {label:"Total study hours", value: fmtHours(m.total_study_hours) + "h"},
    {label:"Avg hours / day", value: fmtHours(m.average_study_hours_per_day) + "h"},
    {label:"Days completed", value: m.study_days_completed, cls:"positive"},
    {label:"Failed days", value: m.failed_days, cls: m.failed_days > 0 ? "negative" : ""},
    {label:"Study fund", value: fmtHours(m.study_fund) + "h", cls:"positive"},
    {label:"Net penalties", value: m.net_penalties + " tk", cls: m.net_penalties > 0 ? "negative" : ""}
  ];
  const statsRow = document.getElementById("statsRow");
  statsRow.innerHTML = "";
  stats.forEach(s=>{
    const div = document.createElement("div");
    div.className = "stat";
    div.innerHTML = `<div class="stat-label">${s.label}</div><div class="stat-value ${s.cls||""}">${s.value}</div>`;
    statsRow.appendChild(div);
  });

  renderTable(report);
}

/* ---------------------------------------------------------
   Table always renders ROWS_PER_TABLE rows.
   Days beyond the available log data are shown as empty
   placeholder rows so the table height never shifts.
--------------------------------------------------------- */
function renderTable(report){
  const tbody = document.getElementById("logBody");
  tbody.innerHTML = "";

  const logsByDay = {};
  (report.daily_logs || []).forEach(d => { logsByDay[d.day_number] = d; });

  const monthLabel = (report.report_period.month_name || "").slice(0,3);

  for(let dayNum = 1; dayNum <= ROWS_PER_TABLE; dayNum++){
    const d = logsByDay[dayNum];
    const tr = document.createElement("tr");

    if(!d){
      tr.className = "empty-row";
      tr.innerHTML = `
        <td class="date-cell">
          <span class="day-name">—</span>
          <span class="day-num">${String(dayNum).padStart(2,"0")}${monthLabel ? " " + monthLabel : ""}</span>
        </td>
        <td class="num">—</td>
        <td class="num">—</td>
        <td class="num">—</td>
        <td><span class="pill none">—</span></td>
        <td class="notes-cell">—</td>
      `;
      tbody.appendChild(tr);
      continue;
    }

    const bonusNet = (d.bonus_hours_earned||0) - (d.bonus_hours_used||0);
    const penaltyNet = (d.penalty||0) - (d.refund||0);
    const bonusFmt = signed(bonusNet, "h");
    const penaltyFmt = signed(penaltyNet, " tk");

    tr.innerHTML = `
      <td class="date-cell">
        <span class="day-name">${d.day_name}</span>
        <span class="day-num">${String(d.day_number).padStart(2,"0")}${monthLabel ? " " + monthLabel : ""}</span>
      </td>
      <td class="num">${fmtHours(d.study_hours)}h</td>
      <td class="num ${bonusFmt.cls}">${bonusFmt.text}</td>
      <td class="num ${penaltyFmt.cls}">${penaltyFmt.text}</td>
      <td><span class="pill ${d.status}">${d.status}</span></td>
      <td class="notes-cell">${d.notes || "—"}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderEmptyTable(){
  const tbody = document.getElementById("logBody");
  tbody.innerHTML = "";
  for(let dayNum = 1; dayNum <= ROWS_PER_TABLE; dayNum++){
    const tr = document.createElement("tr");
    tr.className = "empty-row";
    tr.innerHTML = `
      <td class="date-cell">
        <span class="day-name">—</span>
        <span class="day-num">${String(dayNum).padStart(2,"0")}</span>
      </td>
      <td class="num">—</td>
      <td class="num">—</td>
      <td class="num">—</td>
      <td><span class="pill none">—</span></td>
      <td class="notes-cell">—</td>
    `;
    tbody.appendChild(tr);
  }
}

init();
</script>
</body>
</html>
